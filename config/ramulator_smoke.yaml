# Ramulator2 configuration for MOBOL simulator smoke test
# Based on DDR4-2400, single channel

Frontend:
  impl: SimpleO3
  clock_ratio: 8
  num_expected_insts: 100
  traces: []
  Translation:
    impl: RandomTranslation
    max_addr: 17179869184   # 16 GB = 0x4_0000_0000

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 3

  DRAM:
    impl: DDR4
    org:
      preset: DDR4_8Gb_x8
      channel: 1
      rank: 2
    timing:
      preset: DDR4_2400R

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    RowPolicy:
      impl: ClosedRowPolicy
      cap: 4
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh
