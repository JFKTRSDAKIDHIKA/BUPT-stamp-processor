# ══════════════════════════════════════════════════════════════════════
# MOBOL 3D 堆叠 PR 实验矩阵配置(单一真值源,Task 2/3/4 全部脚本读本文件)
# ══════════════════════════════════════════════════════════════════════
# 架构变体不在这里定义 —— 变体真值源是 ../config/mobol_arch.yaml 的
# compiler.dse 列表(baseline / W2 / nmc / nmc+W2 / dense8192),
# gen_runs.py 直接读取并派生每变体的 HB 接口规模。
# 本文件只放"物理实现"旋钮:工艺假设、die 绑定、流程参数、实验筛选。

paths:
  # 项目与 PDK 根目录;环境变量 MOBOL_ROOT / PDK_ROOT 可覆盖
  mobol_root: /home/jiashuao/storage/BUPT-stamp-processor
  pdk_root:   /home/jiashuao/storage/USC-3N-2D

openroad:
  bin: /home/jiashuao/openroad_local/bin/openroad
  threads: 16

# ─── 3nm 混合键合(HB)与 KOZ 物理假设(可按工艺实测修订) ────────────
tech:
  hb_pitch_um: 2.0        # Cu-Cu 混合键合 pad 间距;3nm 代先进封装 1~9 µm,取保守 2 µm
  hb_ctrl_bits: 16        # 每条垂直链路额外的握手/时钟/冗余 pad 数
  koz_margin_um: 2.0      # KOZ 相对 pad 簇的外扩量(HB 应力远小于 TSV,2 µm 足够)
  edge_gap_um: 4.0        # 边缘 HB 带与 core 边界的间隙
  redist_pitch_um: 0.064  # 策略 B 重分布走线所用高层金属(M8/M9)的布线间距
  channel_util: 0.5       # 通道内走线利用率上限(为 DRC/时钟/电源留余量)——
                          #   这是"策略 B 必须留够通道空间"的量化落点
  offchannel_adj: 0.85    # 策略 B:通道以外核心区 M8/M9 的 GRT 容量削减比例
                          #   (等效 add_routing_guide:把重分布长线"挤"进通道)
  shallow_pad_adj: 0.60   # 策略 B buffer die:DRAM 顶面落点簇上方 M8/M9 容量削减
  macro_util: 0.80        # 宏区域折算利用率(halo/通道开销)
  core_margin_um: 10.0    # die 边界到 core 的margin

# ─── 流程参数 ─────────────────────────────────────────────────────────
flow:
  clock_period_ps: 2000        # 与综合 SDC 一致(500 MHz 逻辑域)
  place_density: 0.55          # 全局布局目标密度(宏多的 die 建议 ≤0.6)
  slew_margin: 20
  cap_margin: 20
  grt_congestion_iterations: 30
  droute_end_iter: -1          # 详细布线迭代上限;-1 = 跑满(冒烟可设 1~3 加速)
  macro_halo_um: 5.0           # rtl_macro_placer 宏 halo

# ─── die 绑定:把综合出的代表性 netlist 绑到三层堆叠中的物理 die ──────
# share = 该 netlist 占对应整层 die 的比例(决定分到的 HB 接口数量);
# grid  = HB 簇的阵列排布(与 bank/tile 物理分组对齐);
# role  = base(计算核心层)/ buffer(SRAM 缓冲层),决定 KOZ 深度语义;
# hb_pin_patterns = 顶层端口中"垂直方向"总线(用 glob 匹配),会被约束到
#                   HB pad 面阵(up: 区域);其余端口按普通边缘 IO 处理。
dies:
  base_die:                    # Base Die 代表实现:NoC + tile 集成系统
    top: noc_tile_sys
    role: base
    share: 1.0                 # 建模整个 base die 的 HB 配额(16 tile 链路 + 16 DRAM 通道)
    grid: [4, 4]               # 4×4 tile 网格(§1:group g = tile 4g..4g+3)
    aspect: 1.0
    target_util: 0.50
    hb_pin_patterns: ["ext_*"] # ext_* 为 tile↔bank 垂直访问总线
  buffer_die:                  # Buffer Die 代表实现:单个 8MB SSP bank(整层的 1/4)
    top: ssp_bank
    role: buffer
    share: 0.25                # 1 bank = 1/4 buffer die → 4 条 tile 链路 + 4 个 DRAM 通道
    grid: [4, 1]               # bank 下方 4 个 tile 排成一条(组内条状)
    aspect: 2.0                # bank 长条形
    target_util: 0.50
    hb_pin_patterns: ["wdata*", "rdata0*", "rdata1*", "waddr*", "raddr0*", "raddr1*", "we"]
  smoke_die:                   # 冒烟验证专用:最小 netlist,分钟级跑通全流程
    top: tile_node
    role: base
    share: 0.0625              # 1/16 die → 1 条 tile 链路 + 1 个 DRAM 通道
    grid: [1, 1]
    aspect: 1.0
    target_util: 0.50
    hb_pin_patterns: ["ext_*"]

# ─── 实验矩阵筛选(run_all.sh 的默认全集;CLI 可再过滤) ──────────────
experiment:
  dies: [base_die, buffer_die]
  variants: all                # all = mobol_arch.yaml compiler.dse 的全部 label
  strategies: [no_redist, edge_redist]   # A = no_redist, B = edge_redist
