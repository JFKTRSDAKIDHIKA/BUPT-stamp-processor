# CACTI 7 config for one tile's LOCAL scratchpad (ARCH_SPEC §3.5).
# The RTL uses a behavioral sram_2r1w; physical PPA (area / access time /
# energy) comes from CACTI with this geometry. Run:
#   cacti -infile rtl/sram/cacti/local_256kB.cfg
# and reconcile the reported access time with the 1-cycle read the memory
# controller assumes at the target clock (500 MHz logic, ARCH_SPEC §8).

-size (bytes) 262144            # 256 KB / tile
-block size (bytes) 64          # 512-bit line = 64 B (SRAM_PORT_W)
-read-write port 1              # 1 write port
-exclusive read port 2         # 2 read ports (2R1W)
-exclusive write port 0
-single ended read ports 0
-search port 0
-UCA bank count 1
-technology (u) 0.028           # 28 nm (set to the target node)
-Data array cell type - "itrs-hp"
-Data array peripheral type - "itrs-hp"
-operating temperature (K) 350
-cache type "ram"
-tag size (b) "default"
-output/input bus width 512
-burst length 1
-internal prefetch width 1
